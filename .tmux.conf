# =============================================================================

# -----------------------------------------------------------------------------
# PREFIXO
# -----------------------------------------------------------------------------
# Troca Ctrl+b pelo mais ergonômico Ctrl+a (estilo GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -----------------------------------------------------------------------------
# GERAL
# -----------------------------------------------------------------------------
#set -g default-terminal "tmux-256color"   # Suporte a 256 cores
#set -ag terminal-overrides ",xterm-256color:RGB"  # True color (RGB)
set -g history-limit 10002                # Histórico de scrollback
set -g base-index 1                       # Janelas começam em 1 (não 0)
setw -g pane-base-index 1                 # Painéis começam em 1
set -g renumber-windows on               # Renumera ao fechar janela
set -sg escape-time 0                    # Sem delay após Esc (essencial para Vim/Neovim)
set -g focus-events on                   # Propaga eventos de foco ao terminal
set -g mouse on                          # Suporte ao mouse

# -----------------------------------------------------------------------------
# ATALHOS DE RECARREGAMENTO
# -----------------------------------------------------------------------------
# Recarrega config sem reiniciar: Prefix + r
bind r source-file ~/.tmux.conf \; display "✔ tmux.conf recarregado!"

# -----------------------------------------------------------------------------
# DIVISÃO DE PAINÉIS (mais intuitivo)
# -----------------------------------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"  # Vertical   → Prefix + |
bind - split-window -v -c "#{pane_current_path}"  # Horizontal → Prefix + -

# Novas janelas abrem no diretório atual
bind c new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# NAVEGAÇÃO ENTRE PAINÉIS (estilo Vim)
# -----------------------------------------------------------------------------
bind h select-pane -L   # Esquerda
bind j select-pane -D   # Baixo
bind k select-pane -U   # Cima
bind l select-pane -R   # Direita

# Redimensionar painéis com Shift + setas
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alternar entre o último painel ativo: Prefix + Espaço
bind Space last-pane

# -----------------------------------------------------------------------------
# NAVEGAÇÃO ENTRE JANELAS
# -----------------------------------------------------------------------------
bind -r p previous-window   # Janela anterior
bind -r n next-window       # Próxima janela

# -----------------------------------------------------------------------------
# MODO CÓPIA (estilo Vim)
# -----------------------------------------------------------------------------
setw -g mode-keys vi

bind Enter copy-mode          # Entra no modo cópia: Prefix + Enter
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# -----------------------------------------------------------------------------
# STATUS BAR
# -----------------------------------------------------------------------------
set -g status on
set -g status-interval 5              # Atualiza a cada 5 segundos
set -g status-position bottom
set -g status-justify left

# Cores da barra
#set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Lado esquerdo: sessão
set -g status-left-length 30
#set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# Janelas
setw -g window-status-format " #I:#W "
#setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W "
#setw -g window-status-style "fg=#6c7086"
#setw -g window-status-current-style "fg=#89b4fa"

# Lado direito: host + hora
set -g status-right-length 60
#set -g status-right "#[fg=#6c7086] %d/%m  #[fg=#cdd6f4,bold]%H:%M #[fg=#89b4fa] #H "

# -----------------------------------------------------------------------------
# PAINÉIS
# -----------------------------------------------------------------------------
#set -g pane-border-style "fg=#313244"
#set -g pane-active-border-style "fg=#89b4fa"
set -g display-panes-time 2000

# -----------------------------------------------------------------------------
# MENSAGENS E ALERTAS
# -----------------------------------------------------------------------------
#set -g message-style "bg=#f38ba8,fg=#1e1e2e,bold"
set -g display-time 2000              # Mensagens ficam 2s na tela
set -g monitor-activity on           # Monitora atividade em outras janelas
set -g visual-activity off           # Sem beep, só indicador visual

# =============================================================================
# ATALHOS RÁPIDOS DE REFERÊNCIA
# =============================================================================
# Prefix = Ctrl+a
#
# Sessões:
#   Prefix + $   → renomear sessão
#   Prefix + d   → desanexar sessão
#   Prefix + s   → listar sessões
#
# Janelas:
#   Prefix + c   → nova janela
#   Prefix + ,   → renomear janela
#   Prefix + &   → fechar janela
#   Prefix + n/p → próxima/anterior
#
# Painéis:
#   Prefix + |   → dividir vertical
#   Prefix + -   → dividir horizontal
#   Prefix + h/j/k/l → navegar (Vim)
#   Prefix + H/J/K/L → redimensionar
#  Prefix + x   → fechar painel
#   Prefix + z   → zoom no painel
#
# Outros:
#   Prefix + r   → recarregar config
#   Prefix + Enter → modo cópia (v=selecionar, y=copiar)
# =============================================================================
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'       # must be after resurrect


# Dracula status bar: CPU, RAM, then continuum save status (far right)
set -g @dracula-plugins 'git battery cpu-usage ram-usage continuum cwd time'
set -g @dracula-show-powerline true
set -g @dracula-military-time true # ex: 15:00
set -g @dracula-border-contrast true

set -g @dracula-show-left-icon session #'#S'
set -g @dracula-cpu-usage-label 'CPU'
set -g @dracula-ram-usage-label 'RAM'
set -g @dracula-ram-usage-colors "pink dark_gray"
set -g @dracula-show-flags true


# Continuum: auto-save every 10 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Cmatrix
set -g lock-command 'cmatrix -ba -u -C magenta'
set -g lock-after-ime 300
# Override Dracula's continuum script with custom "Last saved at HH:MM" format
run-shell 'cp ~/.tmux/scripts/continuum.sh ~/.tmux/plugins/tmux/scripts/continuum.sh 2>/dev/null || true'

