# =============================================================================

# -----------------------------------------------------------------------------
# PREFIXO
# -----------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -----------------------------------------------------------------------------
# GERAL
# -----------------------------------------------------------------------------
set -g history-limit 10002
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g mouse on

# -----------------------------------------------------------------------------
# ATALHOS
# -----------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "✔ tmux.conf recarregado!"
bind c new-window -c "#{pane_current_path}"
bind Space last-pane

# -----------------------------------------------------------------------------
# NAVEGAÇÃO ENTRE JANELAS
# -----------------------------------------------------------------------------
bind -r p previous-window
bind -r n next-window

# -----------------------------------------------------------------------------
# MODO CÓPIA (estilo Vim)
# -----------------------------------------------------------------------------
setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# -----------------------------------------------------------------------------
# STATUS BAR
# -----------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 60
setw -g window-status-format " #I:#W "

# -----------------------------------------------------------------------------
# PAINÉIS
# -----------------------------------------------------------------------------
set -g display-panes-time 2000

# -----------------------------------------------------------------------------
# MENSAGENS E ALERTAS
# -----------------------------------------------------------------------------
set -g display-time 2000
set -g monitor-activity on
set -g visual-activity off

# =============================================================================
# PLUGINS (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'       # must be after resurrect

# Dracula status bar
set -g @dracula-plugins 'git battery cpu-usage ram-usage continuum cwd time custom:claude_usage.sh'
set -g @dracula-custom-plugin-colors "orange dark_gray"
set -g @dracula-show-powerline true
set -g @dracula-military-time true
set -g @dracula-border-contrast true
set -g @dracula-show-left-icon session
set -g @dracula-cpu-usage-label 'CPU'
set -g @dracula-ram-usage-label 'RAM'
set -g @dracula-ram-usage-colors "pink dark_gray"
set -g @dracula-show-flags true

# Continuum: auto-save every 1 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Cmatrix screen lock after 5 min of inactivity
set -g lock-command 'cmatrix -ba -u -C magenta'
set -g lock-after-time 300
